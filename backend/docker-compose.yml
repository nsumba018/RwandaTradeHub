version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rwandatradehub-db
    environment:
      POSTGRES_DB: rwandatradehub_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rwandatradehub-backend
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/rwandatradehub_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres123
      JWT_SECRET: VGhpcyBpcyBhIHNlY3VyZSAyNTYtYml0IHNlY3JldCBrZXkgZm9yIFJ3YW5kYVRyYWRlSHViMjAyNA==
      JWT_EXPIRATION: 86400000
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  pgdata:
