# Server
server.port=${SERVER_PORT:8081}

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/rwandatradehub_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT (base64-encoded 256-bit key)
jwt.secret=${JWT_SECRET:VGhpcyBpcyBhIHNlY3VyZSAyNTYtYml0IHNlY3JldCBrZXkgZm9yIFJ3YW5kYVRyYWRlSHViMjAyNA==}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Logging
logging.level.com.rwandatradehub=INFO
logging.level.org.springframework.security=WARN
